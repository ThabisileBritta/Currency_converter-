
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1.5rem 0; max-width: 480px; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; }
.row { display: flex; gap: 10px; align-items: center; margin-bottom: 1rem; }
.row label { font-size: 13px; color: var(--color-text-secondary); width: 40px; flex-shrink: 0; }
.row input { flex: 1; }
.row select { width: 100px; flex-shrink: 0; font-size: 14px; padding: 0 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); height: 36px; }
.swap-row { display: flex; justify-content: center; margin: 0.5rem 0 1rem; }
.swap-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 6px 16px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; }
.result-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; text-align: center; margin-top: 1rem; }
.result-amount { font-size: 28px; font-weight: 500; color: var(--color-text-primary); }
.result-label { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
.rate-note { font-size: 12px; color: var(--color-text-tertiary); text-align: center; margin-top: 10px; }
.history { margin-top: 1.5rem; }
.history h3 { font-size: 14px; font-weight: 500; margin-bottom: 0.75rem; color: var(--color-text-primary); }
.hist-item { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); }
.hist-item span:last-child { color: var(--color-text-primary); font-weight: 500; }
</style>

<div class="wrap">
  <div class="card">
    <div class="row">
      <label>Amount</label>
      <input type="number" id="amount" value="100" min="0" step="1" oninput="convert()" />
    </div>
    <div class="row">
      <label>From</label>
      <select id="from-cur" onchange="convert()"></select>
    </div>
    <div class="swap-row">
      <button class="swap-btn" onclick="swapCurrencies()">swap ⇅</button>
    </div>
    <div class="row">
      <label>To</label>
      <select id="to-cur" onchange="convert()"></select>
    </div>
    <div class="result-box">
      <div class="result-amount" id="result">—</div>
      <div class="result-label" id="result-label">Enter an amount above</div>
    </div>
    <div class="rate-note" id="rate-note"></div>
  </div>
  <div class="history" id="history-section" style="display:none;">
    <h3>Recent conversions</h3>
    <div id="history-list"></div>
  </div>
</div>

<script>
const currencies = ['USD','EUR','GBP','JPY','ZAR','BWP','NGN','KES','CAD','AUD','CHF','CNY','INR','BRL','MXN'];
const rates = { USD:1, EUR:0.92, GBP:0.79, JPY:149.5, ZAR:18.6, BWP:13.5, NGN:1580, KES:129, CAD:1.36, AUD:1.53, CHF:0.9, CNY:7.24, INR:83.1, BRL:4.97, MXN:17.2 };

const fromSel = document.getElementById('from-cur');
const toSel = document.getElementById('to-cur');
currencies.forEach(c => {
  fromSel.innerHTML += `<option value="${c}" ${c==='USD'?'selected':''}>${c}</option>`;
  toSel.innerHTML += `<option value="${c}" ${c==='BWP'?'selected':''}>${c}</option>`;
});

let history = [];

function convert() {
  const amt = parseFloat(document.getElementById('amount').value);
  const from = fromSel.value;
  const to = toSel.value;
  if (isNaN(amt) || amt <= 0) { document.getElementById('result').textContent = '—'; return; }
  const usd = amt / rates[from];
  const converted = usd * rates[to];
  const rate = rates[to] / rates[from];
  document.getElementById('result').textContent = converted.toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  document.getElementById('result-label').textContent = `${amt.toLocaleString()} ${from} = ${converted.toFixed(2)} ${to}`;
  document.getElementById('rate-note').textContent = `1 ${from} = ${rate.toFixed(4)} ${to} · indicative rates`;
  if (history.length === 0 || history[0].label !== `${amt} ${from} → ${to}`) {
    history.unshift({ label: `${amt} ${from} → ${to}`, value: converted.toFixed(2) + ' ' + to });
    if (history.length > 5) history.pop();
    renderHistory();
  }
}

function renderHistory() {
  const sec = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  if (history.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = history.map(h => `<div class="hist-item"><span>${h.label}</span><span>${h.value}</span></div>`).join('');
}

function swapCurrencies() {
  const tmp = fromSel.value;
  fromSel.value = toSel.value;
  toSel.value = tmp;
  convert();
}

convert();
</script>
